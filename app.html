<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NegoFunil SaaS | Hub de Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #0c0e14; --surface: #13151e; --surface2: #1a1d28; --border: #2a2e42;
            --accent: #00e5a0; --accent3: #7c5cfc; --text: #e8eaf0;
            --text2: #8b90a7; --contato: #4a9eff; --proposta: #f5a623;
            --fechamento: #00e5a0; --perdido: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 70px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Syne'; font-weight: 800; font-size: 22px; color: var(--accent); }
        
        .search-bar {
            background: var(--bg); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 25px; color: #fff; width: 350px; outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--accent3); width: 400px; }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-size: 13px; }
        .btn-primary { background: var(--accent); color: #0c0e14; }
        .btn-pdf { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-right: 10px; }
        .btn-pdf:hover { background: var(--accent3); color: white; }

        /* FUNIL */
        main { padding: 30px; }
        .funnel-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .column { background: var(--surface); border-radius: 12px; min-height: 80vh; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-header { padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Syne'; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
        .col-count { background: var(--border); padding: 2px 8px; border-radius: 10px; font-size: 11px; }

        .body-list { padding: 10px; flex: 1; min-height: 100px; }

        /* CARDS */
        .card { 
            background: var(--surface2); border: 1px solid var(--border); padding: 15px; 
            margin-bottom: 12px; border-radius: 10px; cursor: grab; transition: 0.2s;
        }
        .card:hover { border-color: var(--accent3); transform: translateY(-3px); }
        .card-name { font-family: 'Syne'; font-size: 15px; margin-bottom: 5px; display: block; }
        .card-val { color: var(--accent); font-weight: 700; font-size: 14px; }
        .card-tags { display: flex; justify-content: space-between; margin-top: 10px; align-items: center; }
        .whatsapp-icon { color: #25d366; text-decoration: none; font-size: 18px; }

        /* MODAL */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 200; display: none; align-items: center; justify-content: center; }
        .overlay.open { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 400px; padding: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: #fff; outline: none; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="text-align:center; margin-bottom:30px;">
        <h1 style="font-family: Syne; font-size: 32px; color: var(--accent);">NegoFunil PRO</h1>
        <p style="color: var(--text2)">Hub de Serviços Digital</p>
    </div>
    <div style="width: 320px; display: flex; flex-direction: column; gap: 15px;">
        <input type="email" id="loginEmail" class="form-input" placeholder="Seu e-mail">
        <input type="password" id="loginPass" class="form-input" placeholder="Sua senha">
        <button class="btn btn-primary" onclick="appLogin()">Acessar Painel</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="logo">HUB CRM</div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Pesquisar cliente ou serviço..." onkeyup="filterLeads()">
    <div>
        <button class="btn btn-pdf" onclick="generatePDF()">Relatório PDF</button>
        <button class="btn btn-primary" onclick="toggleModal(true)">+ Novo Lead</button>
    </div>
</header>

<main id="main-content" style="display:none">
    <div class="funnel-board">
        <div class="column"><div class="col-header">Contato <span class="col-count" id="count-contato">0</span></div><div class="body-list" id="list-contato" data-stage="Contato Inicial"></div></div>
        <div class="column"><div class="col-header">Proposta <span class="col-count" id="count-proposta">0</span></div><div class="body-list" id="list-proposta" data-stage="Proposta Enviada"></div></div>
        <div class="column"><div class="col-header">Fechado <span class="col-count" id="count-fechado">0</span></div><div class="body-list" id="list-fechado" data-stage="Fechamento"></div></div>
        <div class="column"><div class="col-header">Perdido <span class="col-count" id="count-perdido">0</span></div><div class="body-list" id="list-perdido" data-stage="Perdido"></div></div>
    </div>
</main>

<div class="overlay" id="modal-lead">
    <div class="modal">
        <h2 style="font-family: Syne; margin-bottom: 20px;">Novo Lead</h2>
        <div class="form-group"><label class="form-label">Nome do Cliente</label><input id="lead-name" class="form-input"></div>
        <div class="form-group"><label class="form-label">Valor do Projeto (R$)</label><input id="lead-value" type="number" class="form-input"></div>
        <div class="form-group"><label class="form-label">Serviço (ex: Google Ads)</label><input id="lead-service" class="form-input"></div>
        <div class="form-group"><label class="form-label">WhatsApp (DDI+DDD+Nº)</label><input id="lead-phone" class="form-input" placeholder="5511999999999"></div>
        <div style="display:flex; gap:10px; margin-top:20px">
            <button class="btn btn-pdf" style="flex:1" onclick="toggleModal(false)">Cancelar</button>
            <button class="btn btn-primary" style="flex:1" onclick="saveLead()">Salvar Lead</button>
        </div>
    </div>
</div>

<script type="module">
    // IMPORTANDO FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    // CONFIGURAÇÃO QUE VOCÊ ME MANDOU
    const firebaseConfig = {
        apiKey: "AIzaSyDMiJmwgxep1USbcmWa8ck3eEI1_I13HRg",
        authDomain: "negofunil-9dda9.firebaseapp.com",
        projectId: "negofunil-9dda9",
        storageBucket: "negofunil-9dda9.firebasestorage.app",
        messagingSenderId: "441217367666",
        appId: "1:441217367666:web:64f2e84c4db69366a9cceb",
        measurementId: "G-TB517RQNJS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // LOGIN
    window.appLogin = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            loadLeads();
        }
    });

    // CRUD LEADS
    window.saveLead = async () => {
        const lead = {
            name: document.getElementById('lead-name').value,
            value: document.getElementById('lead-value').value,
            service: document.getElementById('lead-service').value,
            phone: document.getElementById('lead-phone').value,
            stage: 'Contato Inicial',
            createdAt: new Date()
        };
        await addDoc(collection(db, "leads"), lead);
        toggleModal(false);
    };

    function loadLeads() {
        onSnapshot(collection(db, "leads"), (snapshot) => {
            const lists = { 'Contato Inicial': 'list-contato', 'Proposta Enviada': 'list-proposta', 'Fechamento': 'list-fechado', 'Perdido': 'list-perdido' };
            Object.values(lists).forEach(id => document.getElementById(id).innerHTML = '');
            
            snapshot.forEach(doc => {
                const l = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = doc.id;
                card.innerHTML = `
                    <span class="card-name">${l.name}</span>
                    <span class="card-val">R$ ${l.value}</span>
                    <div class="card-tags">
                        <small style="color:var(--text2)">${l.service}</small>
                        ${l.phone ? `<a href="https://wa.me/${l.phone}" target="_blank" class="whatsapp-icon">󰖣</a>` : ''}
                    </div>
                `;
                document.getElementById(lists[l.stage]).appendChild(card);
            });
            updateMetrics(snapshot);
        });
    }

    // ARRASTAR E SOLTAR
    document.querySelectorAll('.body-list').forEach(el => {
        new Sortable(el, {
            group: 'funnel',
            animation: 150,
            onEnd: async (evt) => {
                const id = evt.item.dataset.id;
                const newStage = evt.to.dataset.stage;
                await updateDoc(doc(db, "leads", id), { stage: newStage });
            }
        });
    });

    // UTILITÁRIOS
    window.toggleModal = (show) => document.getElementById('modal-lead').classList.toggle('open', show);
    
    window.filterLeads = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    };

    window.generatePDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("HUB DE SERVIÇOS - RELATÓRIO DE NEGOCIAÇÕES", 20, 20);
        doc.setFontSize(10);
        let y = 40;
        document.querySelectorAll('.card').forEach(c => {
            doc.text(c.innerText.replace('󰖣','').trim(), 20, y);
            y += 10;
        });
        doc.save("vendas_hub.pdf");
    };

    function updateMetrics(snap) {
        const stages = ['contato', 'proposta', 'fechado', 'perdido'];
        stages.forEach(s => {
            const count = document.querySelectorAll(`#list-${s} .card`).length;
            document.getElementById(`count-${s}`).textContent = count;
        });
    }
</script>
</body>
</html>
