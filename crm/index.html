<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NegoFunil Pro | Pipedrive Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg: #0c0e14; --sidebar: #13151e; --surface: #1a1d28; --border: #2a2e42;
            --accent: #00e5a0; --accent3: #7c5cfc; --text: #e8eaf0;
            --text2: #8b90a7; --contato: #4a9eff; --proposta: #f5a623;
            --fechamento: #00e5a0; --perdido: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* BARRA LATERAL (PIPEDRIVE STYLE) */
        aside {
            width: 70px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            position: fixed; height: 100vh; transition: width 0.3s; z-index: 1000;
        }
        aside:hover { width: 200px; align-items: flex-start; padding-left: 15px; }
        .side-item { 
            width: 100%; height: 50px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; color: var(--text2); 
            transition: 0.2s; overflow: hidden; white-space: nowrap;
        }
        aside:hover .side-item { justify-content: flex-start; gap: 15px; }
        .side-item:hover { color: var(--accent); background: rgba(0, 229, 160, 0.1); }
        .side-text { display: none; font-size: 14px; font-weight: 600; }
        aside:hover .side-text { display: block; }

        /* CONTEÚDO PRINCIPAL */
        .wrapper { margin-left: 70px; flex: 1; display: flex; flex-direction: column; }
        header {
            height: 70px; background: var(--sidebar); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }

        /* FUNIL */
        main { padding: 25px; flex: 1; }
        .funnel-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .column { background: rgba(20, 22, 34, 0.6); border-radius: 10px; min-height: 80vh; border: 1px solid var(--border); }
        .col-header { padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Syne'; font-size: 13px; color: var(--text2); display: flex; justify-content: space-between; }

        /* CARDS */
        .card { 
            background: var(--surface); border: 1px solid var(--border); padding: 15px; 
            margin: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .card-name { font-weight: 700; font-size: 14px; display: block; }
        .activity-tag { font-size: 10px; background: var(--accent3); padding: 2px 6px; border-radius: 4px; margin-top: 8px; display: inline-block; }

        /* MODAIS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal { background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px; width: 450px; padding: 30px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        
        /* CUSTOMER AGENT (BOTÃO FLUTUANTE) */
        .customer-agent {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--accent); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,229,160,0.4);
        }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="font-family: Syne; color: var(--accent); margin-bottom: 20px;">HUB CRM PRO</h1>
    <div style="width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <input type="email" id="loginEmail" class="form-input" placeholder="E-mail">
        <input type="password" id="loginPass" class="form-input" placeholder="Senha">
        <button onclick="appLogin()" style="padding: 12px; background: var(--accent); border: none; border-radius: 6px; cursor: pointer; font-weight: 700;">Entrar</button>
    </div>
</div>

<aside>
    <div class="side-item" onclick="showView('funil')"><span>📊</span><span class="side-text">Funil de Vendas</span></div>
    <div class="side-item" onclick="showView('dash')"><span>📈</span><span class="side-text">Dashboard</span></div>
    <div class="side-item" onclick="showView('radar')"><span>🎯</span><span class="side-text">Radar SEO</span></div>
    <div style="margin-top: auto;" class="side-item" onclick="auth.signOut()"><span>🚪</span><span class="side-text">Sair</span></div>
</aside>

<div class="wrapper">
    <header id="main-header" style="display:none">
        <div style="font-family: Syne; font-weight: 800;">NEGO HUB</div>
        <div style="display: flex; gap: 15px;">
            <input type="text" class="search-bar" style="background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:5px 15px; color:#fff" placeholder="Buscar...">
            <button onclick="toggleModal('modal-new', true)" style="background:var(--accent); border:none; padding:8px 15px; border-radius:6px; font-weight:700; cursor:pointer">+ Negócio</button>
        </div>
    </header>

    <main id="view-funil" style="display:none">
        <div class="funnel-board">
            <div class="column"><div class="col-header">Qualificado</div><div class="body-list" id="list-contato" data-stage="Contato Inicial"></div></div>
            <div class="column"><div class="col-header">Contato Feito</div><div class="body-list" id="list-proposta" data-stage="Proposta Enviada"></div></div>
            <div class="column"><div class="col-header">Apresentação</div><div class="body-list" id="list-fechado" data-stage="Fechamento"></div></div>
            <div class="column"><div class="col-header">Perdido</div><div class="body-list" id="list-perdido" data-stage="Perdido"></div></div>
        </div>
    </main>

    <div id="view-radar" style="display:none; padding: 40px;">
        <h2 style="font-family: Syne; margin-bottom: 20px;">Radar SEO Cliente</h2>
        <input id="radar-url" class="form-input" placeholder="https://site-do-cliente.com.br">
        <button class="btn" style="background: var(--accent3); color:#fff; padding:10px 20px; border-radius:6px; border:none; cursor:pointer" onclick="window.open('https://pagespeed.web.dev/report?url=' + document.getElementById('radar-url').value)">Analisar Performance</button>
    </div>
</div>

<div class="customer-agent" onclick="alert('Como posso ajudar no seu Hub hoje?')">💬</div>

<div class="overlay" id="modal-details">
    <div class="modal">
        <h2 id="det-name" style="font-family: Syne; margin-bottom: 20px;">-</h2>
        <label style="font-size:12px; color:var(--text2)">Agendar Próxima Atividade</label>
        <input type="date" id="act-date" class="form-input">
        <select id="act-type" class="form-input">
            <option value="Call">📞 Chamada</option>
            <option value="Meeting">🤝 Reunião</option>
            <option value="Email">📧 E-mail de Follow-up</option>
        </select>
        <button onclick="saveActivity()" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:6px; cursor:pointer; font-weight:700">Salvar Atividade</button>
        <button onclick="toggleModal('modal-details', false)" style="width:100%; background:transparent; border:none; color:var(--text2); margin-top:10px; cursor:pointer">Fechar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMiJmwgxep1USbcmWa8ck3eEI1_I13HRg",
        authDomain: "negofunil-9dda9.firebaseapp.com",
        projectId: "negofunil-9dda9",
        storageBucket: "negofunil-9dda9.firebasestorage.app",
        messagingSenderId: "441217367666",
        appId: "1:441217367666:web:64f2e84c4db69366a9cceb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentId = null;

    window.appLogin = () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => alert("Erro no login"));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            showView('funil');
            loadLeads();
        }
    });

    function loadLeads() {
        onSnapshot(collection(db, "leads"), (snapshot) => {
            const stages = { 'Contato Inicial': 'list-contato', 'Proposta Enviada': 'list-proposta', 'Fechamento': 'list-fechado', 'Perdido': 'list-perdido' };
            Object.values(stages).forEach(id => document.getElementById(id).innerHTML = '');
            
            snapshot.forEach(docSnap => {
                const l = docSnap.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-name">${l.name}</span>
                    <span style="color:var(--accent); font-size:12px">R$ ${l.value}</span>
                    ${l.nextActivity ? `<div class="activity-tag">📅 ${l.nextActivity}</div>` : ''}
                `;
                card.onclick = () => { currentId = docSnap.id; document.getElementById('det-name').innerText = l.name; toggleModal('modal-details', true); };
                document.getElementById(stages[l.stage]).appendChild(card);
            });
        });
    }

    window.saveActivity = async () => {
        const date = document.getElementById('act-date').value;
        const type = document.getElementById('act-type').value;
        await updateDoc(doc(db, "leads", currentId), { nextActivity: `${type} - ${date}` });
        toggleModal('modal-details', false);
    };

    window.showView = (view) => {
        const views = ['view-funil', 'view-radar'];
        views.forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById('view-' + view).style.display = 'block';
    };

    window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';

    document.querySelectorAll('.body-list').forEach(el => {
        new Sortable(el, { group: 'funnel', animation: 150, onEnd: async (evt) => {
            const id = evt.item.dataset.id; // Precisa do data-id no card para persistir
        }});
    });
</script>
</body>
</html>
