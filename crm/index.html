<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NegoHub OS | Inteligência CRM</title>
    <meta name="google-site-verification" content="Nj60n_sOIVMKqlAEULrdJ3BVdM9qgqcO2cnFme-LAiE" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0c0e14; --sidebar: #13151e; --surface: #1a1d28; --surface2: #222536;
            --border: #2a2e42; --accent: #00e5a0; --accent3: #7c5cfc; --text: #e8eaf0;
            --text2: #8b90a7; --text3: #555a72; --perdido: #ff4757; --warm: #f5a623;
            --contato: #4a9eff; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow: hidden; }

        aside { width: 80px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; position: fixed; height: 100vh; transition: 0.3s; z-index: 1000; }
        aside:hover { width: 220px; align-items: flex-start; padding-left: 15px; }
        .side-item { width: 100%; height: 55px; display: flex; align-items: center; cursor: pointer; color: var(--text2); transition: 0.2s; overflow: hidden; white-space: nowrap; margin-bottom: 5px; border-radius: 12px 0 0 12px; }
        .icon-box { min-width: 80px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        aside:hover .side-text { opacity: 1; }
        .side-text { opacity: 0; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .side-item:hover, .side-item.active { color: var(--accent); background: rgba(0, 229, 160, 0.05); }

        .wrapper { margin-left: 80px; flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 75px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .header-title { font-family: 'Syne'; font-weight: 800; font-size: 20px; color: var(--accent); }

        .view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .view.active { display: flex; }

        /* Funil */
        .funnel-wrap { padding: 20px; flex: 1; overflow-x: auto; overflow-y: hidden; }
        .funnel-board { display: flex; gap: 20px; height: 100%; }
        .column { background: rgba(20, 22, 34, 0.4); border-radius: 16px; border: 1px solid var(--border); width: 310px; flex-shrink: 0; display: flex; flex-direction: column; }
        .col-header { padding: 18px; border-bottom: 1px solid var(--border); font-family: 'Syne'; font-size: 11px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .body-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; min-height: 150px; }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 14px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent3); transform: translateY(-4px); }
        .card-name { font-family: 'Syne'; font-weight: 700; font-size: 14px; margin-bottom: 5px; }
        .card-val { color: var(--accent); font-weight: 700; }
        .badge-svc { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 6px; color: var(--text2); }

        /* Modais */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .overlay.open { display: flex; }
        .modal { background: var(--sidebar); border: 1px solid var(--border); border-radius: 20px; width: 550px; padding: 35px; max-height: 90vh; overflow-y: auto; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn-primary { background: var(--accent); color: #000; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }

        /* Dash */
        .dashboard-wrap { padding: 30px; overflow-y: auto; }
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; border-top: 4px solid var(--accent3); }
        table { width: 100%; border-collapse: collapse; color: var(--text); }
        th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text3); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="side-item active" onclick="showView('funil')"><div class="icon-box">📊</div><span class="side-text">Funil RD Style</span></div>
    <div class="side-item" onclick="showView('dashboard')"><div class="icon-box">📈</div><span class="side-text">Dashboard</span></div>
    <div class="side-item" onclick="exportExcel()"><div class="icon-box">📂</div><span class="side-text">Exportar Excel</span></div>
    <div style="margin-top: auto;" class="side-item" onclick="appLogout()"><div class="icon-box">🚪</div><span class="side-text">Sair</span></div>
</aside>

<div class="wrapper" id="main-wrapper">
    <header>
        <div class="header-title">HUB DIGITAL | CRM</div>
        <div class="header-actions">
            <button class="btn-primary" style="width:auto; padding: 10px 20px;" onclick="openM('modal-new')">+ NOVO LEAD</button>
        </div>
    </header>

    <main id="view-funil" class="view active">
        <div class="funnel-wrap">
            <div class="funnel-board">
                <div class="column"><div class="col-header">Prospecção <span class="col-total" id="tot-contato">R$ 0</span></div><div class="body-list" id="list-contato" data-stage="Contato Inicial"></div></div>
                <div class="column"><div class="col-header">Proposta <span class="col-total" id="tot-proposta">R$ 0</span></div><div class="body-list" id="list-proposta" data-stage="Proposta Enviada"></div></div>
                <div class="column"><div class="col-header">Fechado <span class="col-total" id="tot-fechado">R$ 0</span></div><div class="body-list" id="list-fechado" data-stage="Fechamento"></div></div>
                <div class="column"><div class="col-header">Perdido <span class="col-total" id="tot-perdido">R$ 0</span></div><div class="body-list" id="list-perdido" data-stage="Perdido"></div></div>
            </div>
        </div>
    </main>

    <div id="view-dashboard" class="view">
        <div class="dashboard-wrap">
            <div class="kpi-row">
                <div class="kpi"><div class="kpi-label">Receita</div><div id="dash-receita" class="kpi-val">R$ 0</div></div>
                <div class="kpi"><div class="kpi-label">Ativos</div><div id="dash-ativos" class="kpi-val">0</div></div>
                <div class="kpi"><div class="kpi-label">Conversão</div><div id="dash-conversao" class="kpi-val">0%</div></div>
                <div class="kpi"><div class="kpi-label">Ticket Médio</div><div id="dash-ticket" class="kpi-val">R$ 0</div></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                <div style="background:var(--surface); padding:20px; border-radius:16px;"><canvas id="chartOrigem"></canvas></div>
                <div style="background:var(--surface); padding:20px; border-radius:16px;">
                    <h3 style="margin-bottom:15px; font-size:14px">Histórico Recente</h3>
                    <table id="tabela-leads">
                        <thead><tr><th>Lead</th><th>Status</th><th>Valor</th></tr></thead>
                        <tbody id="tabela-leads-corpo"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="modal-edit">
    <div class="modal">
        <h2 style="font-family:Syne; margin-bottom:20px">Gestão do Lead</h2>
        <input id="edit-id" type="hidden">
        <label style="font-size:12px; color:var(--text2)">Nome do Cliente</label>
        <input id="edit-name" class="form-input">
        
        <label style="font-size:12px; color:var(--text2)">Valor Estimado (R$)</label>
        <input id="edit-val" type="number" class="form-input">

        <label style="font-size:12px; color:var(--accent)">Anotações / Histórico de Conversa</label>
        <textarea id="edit-notes" class="form-input" style="height:100px; resize:none;" placeholder="Ex: Cliente achou caro, retornar dia 20..."></textarea>

        <button class="btn-primary" onclick="updateLead()">SALVAR ALTERAÇÕES</button>
        <button class="btn-primary" style="background:var(--perdido); margin-top:10px; color:#fff" onclick="deleteLead()">EXCLUIR</button>
        <button onclick="closeM('modal-edit')" style="background:none; border:none; color:var(--text2); width:100%; margin-top:10px; cursor:pointer">Voltar</button>
    </div>
</div>

<div class="overlay" id="modal-new">
    <div class="modal">
        <h2 style="font-family:Syne; margin-bottom:20px">Novo Prospecto</h2>
        <input id="new-name" class="form-input" placeholder="Nome da Empresa">
        <input id="new-val" type="number" class="form-input" placeholder="Valor R$">
        <select id="new-svc" class="form-input" style="background:var(--bg); color:#fff">
            <option value="Tráfego Pago">Tráfego Pago</option>
            <option value="Social Media">Social Media</option>
            <option value="Landing Page">Landing Page</option>
        </select>
        <input id="new-phone" class="form-input" placeholder="WhatsApp (DDD+Número)">
        <button class="btn-primary" onclick="saveLead()">CADASTRAR</button>
        <button onclick="closeM('modal-new')" style="background:none; border:none; color:var(--text2); width:100%; margin-top:10px; cursor:pointer">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMiJmwgxep1USbcmWa8ck3eEI1_I13HRg",
        authDomain: "negofunil-9dda9.firebaseapp.com",
        projectId: "negofunil-9dda9",
        storageBucket: "negofunil-9dda9.firebasestorage.app",
        messagingSenderId: "441217367666",
        appId: "1:441217367666:web:64f2e84c4db69366a9cceb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let allLeads = [];
    let meuGrafico = null;

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "../index.html"; else loadData(); });

    function loadData() {
        onSnapshot(collection(db, "leads"), (snap) => {
            const stages = { 'Contato Inicial': 'list-contato', 'Proposta Enviada': 'list-proposta', 'Fechamento': 'list-fechado', 'Perdido': 'list-perdido' };
            const totals = { 'list-contato': 0, 'list-proposta': 0, 'list-fechado': 0, 'list-perdido': 0 };
            Object.values(stages).forEach(id => document.getElementById(id).innerHTML = '');
            allLeads = [];

            snap.forEach(d => {
                const l = { id: d.id, ...d.data() };
                allLeads.push(l);
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = l.id;
                card.innerHTML = `<div onclick="editLead('${l.id}')"><div class="card-name">${l.name}</div><div class="card-val">R$ ${Number(l.value).toLocaleString('pt-BR')}</div><div class="badge-svc">${l.service}</div></div>`;
                document.getElementById(stages[l.stage]).appendChild(card);
                totals[stages[l.stage]] += Number(l.value || 0);
            });

            updateDashboard(totals);
        });
    }

    window.editLead = (id) => {
        const l = allLeads.find(x => x.id === id);
        document.getElementById('edit-id').value = l.id;
        document.getElementById('edit-name').value = l.name;
        document.getElementById('edit-val').value = l.value;
        document.getElementById('edit-notes').value = l.notes || ""; // Carrega as notas
        openM('modal-edit');
    };

    window.updateLead = async () => {
        const id = document.getElementById('edit-id').value;
        await updateDoc(doc(db, "leads", id), {
            name: document.getElementById('edit-name').value,
            value: Number(document.getElementById('edit-val').value),
            notes: document.getElementById('edit-notes').value, // Salva as notas
            lastUpdate: serverTimestamp()
        });
        closeM('modal-edit');
    };

    function updateDashboard(totals) {
        const fechado = allLeads.filter(l => l.stage === 'Fechamento');
        const receita = fechado.reduce((acc, l) => acc + Number(l.value), 0);
        document.getElementById('dash-receita').innerText = 'R$ ' + receita.toLocaleString('pt-BR');
        document.getElementById('dash-ativos').innerText = allLeads.filter(l => l.stage !== 'Fechamento' && l.stage !== 'Perdido').length;
        
        const corpo = document.getElementById('tabela-leads-corpo');
        corpo.innerHTML = '';
        allLeads.slice(0, 5).forEach(l => {
            corpo.innerHTML += `<tr><td>${l.name}</td><td>${l.stage}</td><td style="color:var(--accent)">R$ ${l.value}</td></tr>`;
        });

        Object.keys(totals).forEach(k => {
            const el = document.getElementById('tot-' + k.split('-')[1]);
            if(el) el.innerText = 'R$ ' + totals[k].toLocaleString('pt-BR');
        });
        renderizarGraficos();
    }

    function renderizarGraficos() {
        const ctx = document.getElementById('chartOrigem').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Google', 'Insta', 'Outros'],
                datasets: [{ data: [50, 30, 20], backgroundColor: ['#00e5a0', '#7c5cfc', '#4a9eff'], borderWidth: 0 }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });
    }

    window.saveLead = async () => {
        await addDoc(collection(db, "leads"), {
            name: document.getElementById('new-name').value,
            value: Number(document.getElementById('new-val').value),
            service: document.getElementById('new-svc').value,
            phone: document.getElementById('new-phone').value,
            stage: 'Contato Inicial',
            notes: "",
            lastUpdate: serverTimestamp()
        });
        closeM('modal-new');
    };

    window.showView = (v) => {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    window.openM = (id) => document.getElementById(id).classList.add('open');
    window.closeM = (id) => document.getElementById(id).classList.remove('open');
    window.appLogout = () => signOut(auth).then(() => window.location.href = "../index.html");

    document.querySelectorAll('.body-list').forEach(el => {
        new Sortable(el, { group: 'funnel', onEnd: async (e) => {
            await updateDoc(doc(db, "leads", e.item.dataset.id), { stage: e.to.dataset.stage, lastUpdate: serverTimestamp() });
        }});
    });
</script>
</body>
</html>
