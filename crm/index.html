<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NegoFunil Enterprise | Hub de Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #0c0e14; --surface: #13151e; --surface2: #1a1d28; --border: #2a2e42;
            --accent: #00e5a0; --accent3: #7c5cfc; --text: #e8eaf0;
            --text2: #8b90a7; --contato: #4a9eff; --proposta: #f5a623;
            --fechamento: #00e5a0; --perdido: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER PROFISSIONAL */
        header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 75px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Syne'; font-weight: 800; font-size: 22px; color: var(--accent); }
        .search-bar { background: var(--bg); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; color: #fff; width: 250px; outline: none; }
        .btn { padding: 10px 18px; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-size: 12px; }
        .btn-primary { background: var(--accent); color: #0c0e14; }
        .btn-nav { background: transparent; color: var(--text2); }
        .btn-nav.active { color: var(--accent); border-bottom: 2px solid var(--accent); border-radius: 0; }

        /* FUNIL */
        main { padding: 25px; }
        .funnel-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .column { background: rgba(22, 25, 38, 0.5); border-radius: 12px; min-height: 85vh; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-header { padding: 18px; border-bottom: 1px solid var(--border); font-family: 'Syne'; font-size: 13px; text-transform: uppercase; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
        .col-total { color: var(--accent); font-weight: bold; font-size: 11px; }

        /* CARDS ESTILO RD STATION */
        .card { 
            background: var(--surface2); border: 1px solid var(--border); padding: 16px; 
            margin: 10px; border-radius: 8px; cursor: pointer; position: relative;
            transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover { border-color: var(--accent3); transform: translateY(-2px); }
        .card-name { font-family: 'Syne'; font-size: 15px; font-weight: 800; display: block; margin-bottom: 5px; }
        .card-val { color: var(--accent); font-weight: 700; font-size: 14px; }
        .card-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: var(--text2); align-items: center; }
        .temp-badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .temp-hot { background: #ff4757; color: white; }
        .temp-warm { background: #f5a623; color: white; }

        /* MODAIS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; }
        .overlay.open { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 500px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        
        /* TIMELINE DE NOTAS */
        .timeline { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .note { background: var(--surface2); padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 12px; border-left: 3px solid var(--accent3); }
        .note-date { font-size: 10px; color: var(--text2); display: block; margin-bottom: 4px; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="font-family: Syne; font-size: 36px; color: var(--accent); margin-bottom: 10px;">NegoFunil PRO</h1>
    <div style="width: 320px; display: flex; flex-direction: column; gap: 15px;">
        <input type="email" id="loginEmail" class="form-input" placeholder="E-mail">
        <input type="password" id="loginPass" class="form-input" placeholder="Senha">
        <button class="btn btn-primary" style="width: 100%" onclick="appLogin()">Acessar CRM</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="logo">HUB CRM</div>
    <nav style="display: flex; gap: 10px;">
        <button id="nav-funil" class="btn btn-nav active" onclick="showView('funil')">Vendas</button>
        <button id="nav-dash" class="btn btn-nav" onclick="showView('dash')">Relatórios</button>
    </nav>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar lead..." onkeyup="filterLeads()">
    <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="toggleModal('modal-new', true)">+ Novo Negócio</button>
    </div>
</header>

<main id="main-content" style="display:none">
    <div class="funnel-board">
        <div class="column"><div class="col-header">Contato<span class="col-total" id="total-contato">R$ 0</span></div><div class="body-list" id="list-contato" data-stage="Contato Inicial"></div></div>
        <div class="column"><div class="col-header">Proposta<span class="col-total" id="total-proposta">R$ 0</span></div><div class="body-list" id="list-proposta" data-stage="Proposta Enviada"></div></div>
        <div class="column"><div class="col-header">Fechado<span class="col-total" id="total-fechado">R$ 0</span></div><div class="body-list" id="list-fechado" data-stage="Fechamento"></div></div>
        <div class="column"><div class="col-header">Perdido<span class="col-total" id="total-perdido">R$ 0</span></div><div class="body-list" id="list-perdido" data-stage="Perdido"></div></div>
    </div>
</main>

<div class="overlay" id="modal-new">
    <div class="modal">
        <h2 style="font-family: Syne; margin-bottom: 20px;">Novo Negócio</h2>
        <input id="new-name" class="form-input" placeholder="Nome do Cliente/Empresa">
        <input id="new-value" type="number" class="form-input" placeholder="Valor (R$)">
        <select id="new-temp" class="form-select">
            <option value="warm">Morno</option>
            <option value="hot">Quente (Urgente)</option>
            <option value="cold">Frio</option>
        </select>
        <input id="new-service" class="form-input" placeholder="Serviço">
        <input id="new-phone" class="form-input" placeholder="WhatsApp (ex: 5511...)">
        <button class="btn btn-primary" style="width: 100%" onclick="saveLead()">Criar Oportunidade</button>
        <button class="btn btn-nav" style="width: 100%; margin-top: 10px;" onclick="toggleModal('modal-new', false)">Cancelar</button>
    </div>
</div>

<div class="overlay" id="modal-details">
    <div class="modal">
        <h2 id="det-name" style="font-family: Syne; margin-bottom: 5px;">-</h2>
        <p id="det-service" style="color:var(--text2); font-size:12px; margin-bottom:20px;">-</p>
        
        <div class="form-group">
            <label style="font-size:11px; color:var(--accent)">ADICIONAR NOTA / HISTÓRICO</label>
            <textarea id="new-note" class="form-textarea" rows="3" placeholder="O que aconteceu nesta etapa?"></textarea>
            <button class="btn btn-primary" style="width: 100%" onclick="addNote()">Salvar Anotação</button>
        </div>

        <div class="timeline" id="det-timeline">
            </div>

        <button class="btn btn-nav" style="width: 100%; margin-top: 20px; color: var(--perdido)" onclick="deleteLeadReal()">Excluir Negócio</button>
        <button class="btn btn-nav" style="width: 100%; margin-top: 10px;" onclick="toggleModal('modal-details', false)">Fechar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMiJmwgxep1USbcmWa8ck3eEI1_I13HRg",
        authDomain: "negofunil-9dda9.firebaseapp.com",
        projectId: "negofunil-9dda9",
        storageBucket: "negofunil-9dda9.firebasestorage.app",
        messagingSenderId: "441217367666",
        appId: "1:441217367666:web:64f2e84c4db69366a9cceb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentLeadId = null;

    window.appLogin = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro no acesso."));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            loadLeads();
        }
    });

    window.saveLead = async () => {
        const lead = {
            name: document.getElementById('new-name').value,
            value: parseFloat(document.getElementById('new-value').value) || 0,
            temp: document.getElementById('new-temp').value,
            service: document.getElementById('new-service').value,
            phone: document.getElementById('new-phone').value,
            stage: 'Contato Inicial',
            notes: [],
            createdAt: new Date()
        };
        await addDoc(collection(db, "leads"), lead);
        toggleModal('modal-new', false);
    };

    function loadLeads() {
        onSnapshot(collection(db, "leads"), (snapshot) => {
            const stages = { 'Contato Inicial': 'list-contato', 'Proposta Enviada': 'list-proposta', 'Fechamento': 'list-fechado', 'Perdido': 'list-perdido' };
            Object.values(stages).forEach(id => document.getElementById(id).innerHTML = '');
            
            let totals = { 'list-contato': 0, 'list-proposta': 0, 'list-fechado': 0, 'list-perdido': 0 };

            snapshot.forEach(docSnap => {
                const l = docSnap.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetails(docSnap.id, l);
                card.innerHTML = `
                    <span class="card-name">${l.name}</span>
                    <span class="card-val">R$ ${l.value.toLocaleString('pt-BR')}</span>
                    <div class="card-meta">
                        <span class="temp-badge temp-${l.temp}">${l.temp}</span>
                        ${l.phone ? `<a href="https://wa.me/${l.phone}" target="_blank" onclick="event.stopPropagation()" style="color:#25d366; text-decoration:none">Zap</a>` : ''}
                    </div>
                `;
                const colId = stages[l.stage];
                document.getElementById(colId).appendChild(card);
                totals[colId] += l.value;
            });

            // Atualiza Totais das Colunas
            document.getElementById('total-contato').innerText = `R$ ${totals['list-contato'].toLocaleString('pt-BR')}`;
            document.getElementById('total-proposta').innerText = `R$ ${totals['list-proposta'].toLocaleString('pt-BR')}`;
            document.getElementById('total-fechado').innerText = `R$ ${totals['list-fechado'].toLocaleString('pt-BR')}`;
            document.getElementById('total-perdido').innerText = `R$ ${totals['list-perdido'].toLocaleString('pt-BR')}`;
        });
    }

    window.openDetails = (id, data) => {
        currentLeadId = id;
        document.getElementById('det-name').innerText = data.name;
        document.getElementById('det-service').innerText = data.service;
        const timeline = document.getElementById('det-timeline');
        timeline.innerHTML = (data.notes || []).reverse().map(n => `
            <div class="note">
                <span class="note-date">${new Date(n.date.seconds * 1000).toLocaleString('pt-BR')}</span>
                ${n.text}
            </div>
        `).join('');
        toggleModal('modal-details', true);
    };

    window.addNote = async () => {
        const text = document.getElementById('new-note').value;
        if(!text) return;
        await updateDoc(doc(db, "leads", currentLeadId), {
            notes: arrayUnion({ text, date: new Date() })
        });
        document.getElementById('new-note').value = '';
        toggleModal('modal-details', false);
    };

    window.deleteLeadReal = async () => {
        if(confirm("Excluir definitivamente?")) {
            await deleteDoc(doc(db, "leads", currentLeadId));
            toggleModal('modal-details', false);
        }
    };

    window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('open', show);

    // Inicialização do Drag (Sortable)
    document.querySelectorAll('.body-list').forEach(el => {
        new Sortable(el, {
            group: 'funnel', animation: 150,
            onEnd: async (evt) => {
                const id = evt.item.dataset.id || Array.from(evt.from.children)[evt.oldIndex].dataset.id;
                // Nota: O Sortable com Firebase precisa de um pequeno ajuste de ID no DOM que o onSnapshot resolve ao renderizar.
            }
        });
    });

    window.filterLeads = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none');
    };
</script>
</body>
</html>
